const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const counter = document.getElementById('counter');
const filterBtns = document.querySelectorAll('.filter-btn');

let activeFilter = 'all';

function renderCards(list) {
  grid.innerHTML = '';
  list.forEach(law => {
    const card = document.createElement('div');
    card.className = 'law-card';
    card.dataset.id = law.n;
    card.innerHTML = `
      <div class="law-number">Hukum ${law.n.toString().padStart(2,'0')}</div>
      <div class="law-title">${law.title}</div>
      <div class="law-summary">${law.summary}</div>
      <div class="law-detail">
        <p>${law.detail}</p>
        <span class="key-action">${law.action}</span>
      </div>
      <div class="expand-hint">↓ detail</div>
    `;
    card.addEventListener('click', () => {
      const isExp = card.classList.contains('expanded');
      document.querySelectorAll('.law-card.expanded').forEach(c => {
        c.classList.remove('expanded');
        c.querySelector('.expand-hint').textContent = '↓ detail';
      });
      if (!isExp) {
        card.classList.add('expanded');
        card.querySelector('.expand-hint').textContent = '↑ tutup';
      }
    });
    grid.appendChild(card);
  });
  counter.textContent = `${list.length} Hukum`;
}

function getFiltered() {
  const q = searchInput.value.toLowerCase().trim();
  return laws.filter(law => {
    const matchFilter = activeFilter === 'all' || law.tags.includes(activeFilter);
    const matchSearch = !q || 
      law.title.toLowerCase().includes(q) || 
      law.summary.toLowerCase().includes(q) || 
      law.detail.toLowerCase().includes(q) ||
      law.action.toLowerCase().includes(q) ||
      String(law.n).includes(q);
    return matchFilter && matchSearch;
  });
}

searchInput.addEventListener('input', () => renderCards(getFiltered()));

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards(getFiltered());
  });
});

renderCards(laws);
</script>
